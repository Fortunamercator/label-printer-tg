<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Печать этикеток</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>
    <div id="app">
        <!-- Экран формы -->
        <div id="form-screen" class="screen active">
            <h1>Печать этикеток</h1>
            
            <div class="form-group">
                <label for="template-select">Товар (полка)</label>
                <select id="template-select">
                    <option value="">Загрузка...</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="quantity">Количество этикеток</label>
                <input type="number" id="quantity" min="1" max="100" value="1">
            </div>
            
            <div class="form-group">
                <label for="date">Дата изготовления</label>
                <input type="date" id="date">
            </div>
            
            <button id="generate-btn" class="btn btn-primary" disabled>
                Сформировать
            </button>
        </div>
        
        <!-- Экран превью -->
        <div id="preview-screen" class="screen">
            <div class="preview-header">
                <button id="back-btn" class="btn btn-secondary">← Назад</button>
                <h2>Превью</h2>
            </div>
            
            <div id="preview-container">
                <iframe id="pdf-preview" title="PDF Preview"></iframe>
            </div>
            
            <div class="preview-actions">
                <button id="print-btn" class="btn btn-primary">
                    🖨️ Печать
                </button>
            </div>
        </div>
        
        <!-- Загрузка -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Формирование PDF...</p>
        </div>
    </div>
    
    <!-- Скрытый canvas для генерации штрих-кода -->
    <canvas id="barcode-canvas" style="display: none;"></canvas>
    
    <!-- Шаблон этикетки для рендеринга (позиционируем за экраном, но видимым для html2canvas) -->
    <div id="label-template" style="position: fixed; left: 0; top: 0; z-index: -1; opacity: 0; pointer-events: none;">
        <div id="label-content" style="width: 232px; height: 160px; padding: 8px; box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; background: white; border: 1px solid #000;">
            <div id="label-title" style="font-size: 10px; font-weight: bold; line-height: 1.3; margin-bottom: 4px; color: #000;"></div>
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <span id="label-color" style="font-size: 9px; color: #000;"></span>
                <span id="label-size" style="font-size: 16px; font-weight: bold; color: #000;"></span>
            </div>
            <div id="label-country" style="font-size: 9px; margin-top: 4px; color: #000;"></div>
            <div id="label-manufacturer" style="font-size: 9px; line-height: 1.3; color: #000;"></div>
            <div id="label-material" style="font-size: 9px; color: #000;"></div>
            <div id="label-date" style="font-size: 9px; color: #000;"></div>
            <div style="text-align: center; margin-top: 6px;">
                <canvas id="label-barcode"></canvas>
            </div>
        </div>
    </div>
    
    <script src="js/storage.js?v=6"></script>
    <script src="js/barcode.js?v=6"></script>
    <script src="js/pdf-generator.js?v=6"></script>
    <script src="js/app.js?v=6"></script>
</body>
</html>
